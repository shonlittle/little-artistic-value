<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Little Artistic Value</title>
    <link rel="stylesheet" href="assets/styles/main.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-content">
        <a href="index.html" class="nav-logo">Little Artistic Value</a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </div>
    </nav>

    <main>
      <section class="contact">
        <h2>Get in Touch</h2>
        <div class="contact-content">
          <div class="contact-info">
            <p>
              Have a question about our work or want to collaborate? We'd love
              to hear from you.
            </p>
          </div>
          <form
            id="contact-form"
            action="https://formspree.io/f/xldnbavj"
            method="POST"
          >
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" required />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required />
            </div>
            <div class="form-group">
              <label for="subject">Subject</label>
              <input type="text" id="subject" name="subject" required />
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea
                id="message"
                name="message"
                rows="5"
                required
              ></textarea>
            </div>
            <button type="submit" class="submit-button">Send Message</button>
          </form>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-content">
        <p>&copy; 2025 Little Artistic Value. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
