<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Little Artistic Value</title>
    <link rel="stylesheet" href="assets/styles/main.css" />
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="past-projects.html">Past Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>

    <header class="site-title">
      <h1>Little Artistic Value</h1>
    </header>

    <main>
        <h2>Get in Touch</h2>
        <div class="contact-content">
          <div class="contact-info">
            <p>
              Have a question about our projects or want to collaborate? We'd
              love to hear from you.
            </p>
            
          </div>
          <form
            id="contact-form"
            action="https://formspree.io/f/xldnbavj"
            method="POST"
          >
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" required />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required />
            </div>
            <div class="form-group">
              <label for="subject">Subject</label>
              <input type="text" id="subject" name="subject" required />
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea
                id="message"
                name="message"
                rows="6"
                required
              ></textarea>
            </div>
            <button type="submit" class="submit-button">Send Message</button>
          </form>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2024 Little Artistic Value</p>
      <p>
        <a href="https://github.com/shonlittle" target="_blank">GitHub</a> |
        <a href="mailto:contact@littleartisticvalue.com"
          >contact@littleartisticvalue.com</a
        >
      </p>
    </footer>
  </body>
</html>
